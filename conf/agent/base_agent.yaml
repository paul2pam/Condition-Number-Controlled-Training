# Base Agent Config
actor_lr: 3e-4
critic_lr: 3e-4
temp_lr: 3e-4
lr_end: 3e-5
hidden_dims_critic: [512, 512, 512, 512]
hidden_dims_actor: [256, 256, 256, 256]
policy_delay: 3
weight_decay: 0.0
reset_freq: 0 # choices: 0 (no reset), 250_000 (default)
reward_normalization: true

target_entropy: auto # choices: auto, int()
tau: 0.005
init_temperature: 0.01
max_v: 5.0
min_v: -5.0
target_net_update_freq: 1

# Network
n_critics: 2
pre_activation_bn: 1
normalize_last_layer: 1
use_layer_norm: 0
use_batch_norm: 1
use_weight_norm: 1
decay_bn: 0
skip_connections: 0
critic_loss: categorical


